# Sensible base
set -g mouse off
set -g history-limit 200000
set -s escape-time 1
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g focus-events on
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"
set-option -g status-position top

# Prefix and ergonomics
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Splits: mnemonic keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# go back to last window
bind-key '\' select-window -l

# Pane movement and resize
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind R command-prompt -I "#S" "rename-session '%%'"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-window -l'

bind-key -N "last-session" P switch-client -l
bind-key O run-shell "~/Dotfiles/scripts/tmux-muxx-picker.sh"

# Copy-mode with macOS clipboard (vi-style)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Quality-of-life
set -g allow-rename off
set -g set-titles on
set -g set-titles-string "#S:#I.#P #W"
set -g status-interval 5
set -g status-justify centre

# Status bar
set -g status-position top
set -g status-interval 1
set -g display-time 1000
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# Catppuccin Mocha
set -g @catppuccin_flavor 'mocha'

# Window status: plugin skips format when style=none, set manually below
set -g @catppuccin_window_status_style 'none'

# Status modules: no separators, transparent backgrounds
set -g @catppuccin_status_background 'none'
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_status_left_separator ''
set -g @catppuccin_status_right_separator ''
set -g @catppuccin_status_middle_separator ''
set -g @catppuccin_status_module_text_bg 'default'

# Session module: colored icon glyph, no filled background
set -g @catppuccin_status_session_icon_fg '#{?client_prefix,#{@thm_red},#{@thm_green}}'
set -g @catppuccin_status_session_icon_bg 'default'
set -g @catppuccin_status_session_text_bg 'default'

# Continuum autosave/restore
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.tmux/resurrect'

# Initialize TPM (must be last)
run '~/.tmux/plugins/tpm/tpm'

# Status line (set after plugin load so @thm_* vars are available)
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# Let format conditionals handle alert colors, not tmux's style overrides
set -g window-status-activity-style "none"
set -g window-status-bell-style "none"

# Window formats: number color reflects alert state
set -g window-status-format "#[fg=#{?window_bell_flag,#{@thm_red},#{?window_activity_flag,#{@thm_yellow},#{@thm_overlay_1}}}] #I #[fg=#{?window_bell_flag,#{@thm_red},#{?window_activity_flag,#{@thm_yellow},#{@thm_subtext_0}}}]#W "
set -g window-status-current-format "#[fg=#{?window_bell_flag,#{@thm_red},#{?window_activity_flag,#{@thm_yellow},#{@thm_mauve}}},bold] #I #[fg=#{?window_bell_flag,#{@thm_red},#{?window_activity_flag,#{@thm_yellow},#{@thm_fg}}},bold]#W "
set -g window-status-separator " "
