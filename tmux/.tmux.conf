# Sensible base
set -g mouse off
set -g history-limit 200000
set -s escape-time 1
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g focus-events on
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color:Tc"
set-option -g status-position top

# Prefix and ergonomics
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Splits: mnemonic keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# go back to last window
bind-key '\' select-window -l

# Pane movement and resize
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind R command-prompt -I "#S" "rename-session '%%'"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-window -l'
bind -N "last-session (via sesh) " L run-shell "sesh last"
bind-key "O" run-shell "sesh connect \"$(
  sesh list -t | fzf-tmux -p 55%,60% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(⚡ )+reload(sesh list -t)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""
bind -N "last-session (via sesh) " L run-shell "sesh last"

# Copy-mode with macOS clipboard (vi-style)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Quality-of-life
set -g allow-rename off
set -g set-titles on
set -g set-titles-string "#S:#I.#P #W"
set -g status-interval 5
set -g status-justify centre

# Simple clean statusline
set -g status-bg colour233    # nearly black
set -g status-fg colour189    # greyish foreground
set -g status-justify left
set -g status-left-length 120
set -g status-right-length 120
set -g window-status-current-format "#[fg=colour233,bg=colour68,bold]  #I #W #{?window_zoomed_flag,+ ,}#{?window_bell_flag,! ,}#{?window_activity_flag,# ,} "
set -g window-status-format "#[fg=colour189,bg=#{?window_last_flag,colour235,colour233},bold]  #I #W #{?window_zoomed_flag,+ ,}#{?window_bell_flag,! ,}#{?window_activity_flag,# ,} "
set -g window-status-separator " "
set -g status-left ""
set -g status-right "#[fg=colour233,bg=colour68,bold] #S #[fg=colour214,bg=default]"
set -g message-style 'fg=colour68,bg=colour233'
set -g message-command-style 'fg=colour233,bg=colour68'
set -g pane-border-style 'fg=colour233'
set -g pane-active-border-style 'fg=colour68'

set -g display-panes-active-colour colour68
set -g display-panes-colour colour233
set -g clock-mode-colour colour68

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Optional: Vim navigation across tmux panes
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Continuum autosave/restore
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.tmux/resurrect'

# Prefix highlight (Tokyonight palette)
set -g @prefix_highlight_fg 'colour233'    # Nearly black text while highlighted (or 'colour189' for light blue)
set -g @prefix_highlight_bg 'colour68'     # Tokyonight blue background (easy to spot)
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour233,bg=colour81'  # Foreground nearly black, background Tokyonight cyan

set -g status-interval 1
set -g display-time 1000

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
