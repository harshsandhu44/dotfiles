[general]
import = ["~/.config/alacritty/themes/themes/sonokai_maia.toml"]
live_config_reload = true

[window]
padding = { x = 6, y = 0 }
dynamic_padding = true
decorations = "full"
opacity = 1.0
option_as_alt = "Both"
startup_mode = "Windowed"
dynamic_title = true

[font]
size = 16
offset = { x = 0, y = 4 }
glyph_offset = { x = 0, y = 0 }

[font.normal]
family = "GoogleSansCode Nerd Font"

[selection]
save_to_clipboard = true

[scrolling]
history = 10000

[cursor]
style = { shape = "Block", blinking = "Off" }
vi_mode_style = { shape = "Block", blinking = "Off" }

[colors]
draw_bold_text_with_bright_colors = true

[terminal]
shell = { program = "/bin/zsh", args = ["-l"] }

[mouse]
hide_when_typing = true

[env]
TERM = "xterm-256color"

[keyboard]
bindings = [
  # Option+Arrow: word movement (fixes "D" being typed)
  { key = "Left",  mods = "Alt", chars = "\u001bb" },
  { key = "Right", mods = "Alt", chars = "\u001bf" },

  # Command+Left/Right: beginning/end of line
  { key = "Left",  mods = "Command", chars = "\u001bOH" },
  { key = "Right", mods = "Command", chars = "\u001bOF" },

  # Command+Up/Down: scroll page
  { key = "Up",   mods = "Command", action = "ScrollPageUp" },
  { key = "Down", mods = "Command", action = "ScrollPageDown" },
  { key = "Up",   mods = "Command|Shift", action = "ScrollToTop" },
  { key = "Down", mods = "Command|Shift", action = "ScrollToBottom" },

  # Enter/exit vi mode
  { key = "Space", mods = "Control|Shift", action = "ToggleViMode" },
  { key = "Escape", mode = "Vi", action = "ToggleViMode" },

  # Vi mode: movement
  { key = "H", mode = "Vi|~Search", action = "Left" },
  { key = "J", mode = "Vi|~Search", action = "Down" },
  { key = "K", mode = "Vi|~Search", action = "Up" },
  { key = "L", mode = "Vi|~Search", action = "Right" },
  { key = "W", mode = "Vi|~Search", action = "SemanticRight" },
  { key = "B", mode = "Vi|~Search", action = "SemanticLeft" },
  { key = "E", mode = "Vi|~Search", action = "SemanticRightEnd" },
  { key = "G", mode = "Vi|~Search", action = "ScrollToBottom" },
  { key = "G", mods = "Shift", mode = "Vi|~Search", action = "ScrollToTop" },

  # Vi mode: selection
  { key = "V", mode = "Vi|~Search", action = "ToggleNormalSelection" },
  { key = "V", mods = "Shift", mode = "Vi|~Search", action = "ToggleLineSelection" },

  # Vi mode: copy & search
  { key = "Y", mode = "Vi|~Search", action = "Copy" },
  { key = "Slash", mode = "Vi|~Search", action = "SearchForward" },
  { key = "N", mode = "Vi|~Search", action = "SearchNext" },
  { key = "N", mods = "Shift", mode = "Vi|~Search", action = "SearchPrevious" },
]
